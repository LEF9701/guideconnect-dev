<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head}">
    <title th:text="${tourist.displayName} + ' - Tourist Profile'">Tourist Profile</title>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow-1 py-4">
    <div class="container">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body text-center p-4">
                        <div class="bg-light rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                             style="width: 88px; height: 88px;">
                            <i class="bi bi-person-fill" style="font-size: 2.8rem;"></i>
                        </div>
                        <h2 class="h4 mb-1" th:text="${tourist.displayName}">Tourist Name</h2>
                        <p class="text-muted mb-3">Traveler</p>

                        <div class="text-warning mb-2">
                            <i class="bi bi-star-fill"></i>
                            <span th:text="${tourist.avgRating != null ? #numbers.formatDecimal(tourist.avgRating, 1, 1) : 'N/A'}">4.6</span>
                        </div>
                        <p class="text-muted small mb-3">
                            <span th:text="${tourist.reviewCount != null ? tourist.reviewCount : 0}">0</span> reviews
                        </p>

                        <div class="border rounded p-3 bg-light-subtle text-start">
                            <p class="mb-2">
                                <strong>Language Preferences:</strong>
                                <span th:text="${tourist.languagePreferences != null and !#strings.isEmpty(tourist.languagePreferences) ? tourist.languagePreferences : 'Not provided'}">English</span>
                            </p>
                            <p class="mb-0">
                                <strong>Booking History:</strong>
                                <span th:text="${bookingHistory.totalElements}">0</span> bookings
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">Recent Booking History</h4>
                        <span class="badge bg-primary" th:text="${bookingHistory.totalElements} + ' total'">0 total</span>
                    </div>
                    <div class="card-body">
                        <div th:if="${bookingHistory.totalElements == 0}" class="text-muted">No bookings yet.</div>
                        <div th:if="${bookingHistory.totalElements > 0}" class="table-responsive">
                            <table class="table table-striped align-middle mb-0">
                                <thead>
                                <tr>
                                    <th>Tour</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="booking : ${bookingHistory.content}">
                                    <td th:text="${booking.tour.title}">Tour Title</td>
                                    <td th:text="${#temporals.format(booking.requestedDate, 'MMM dd, yyyy')}">Jan 01, 2026</td>
                                    <td>
                                        <span class="badge"
                                              th:classappend="${booking.status.name() == 'CONFIRMED' ? 'bg-success' :
                                                                booking.status.name() == 'NEGOTIATING' ? 'bg-warning text-dark' :
                                                                booking.status.name() == 'REQUESTED' ? 'bg-info' :
                                                                booking.status.name() == 'COMPLETED' ? 'bg-secondary' : 'bg-danger'}"
                                              th:text="${booking.status}">CONFIRMED</span>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">Recent Reviews</h4>
                        <span class="badge bg-secondary" th:text="${reviews.totalElements} + ' total'">0 total</span>
                    </div>
                    <div class="card-body">
                        <div th:if="${reviews.totalElements == 0}" class="text-muted">No reviews yet.</div>
                        <div th:if="${reviews.totalElements > 0}" th:each="review, iterStat : ${reviews.content}"
                             th:classappend="${!iterStat.last ? 'border-bottom pb-3 mb-3' : ''}">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <strong th:text="${review.reviewer.displayName}">Reviewer</strong>
                                    <div class="text-warning small">
                                        <i th:each="i : ${#numbers.sequence(1, 5)}"
                                           th:class="${i <= review.starRating ? 'bi bi-star-fill' : 'bi bi-star'}"></i>
                                    </div>
                                </div>
                                <small class="text-muted"
                                       th:text="${#temporals.format(review.createdAt, 'MMM dd, yyyy')}">Jan 01, 2026</small>
                            </div>
                            <p class="mt-2 mb-0"
                               th:text="${review.comment != null and !#strings.isEmpty(review.comment) ? review.comment : 'No written comment provided.'}">
                                Review text
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/header :: scripts}"></div>
</body>
</html>
